global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # Docker daemon metrics (enabled on the host via /etc/docker/daemon.json).
  # Reached over the docker bridge gateway (host.docker.internal). The daemon's
  # metrics-addr MUST bind a non-loopback address (e.g. 0.0.0.0:9323), or this
  # target stays DOWN — see README step 1.
  - job_name: docker
    static_configs:
      - targets: ["host.docker.internal:9323"]
