apiVersion: 1

groups:
  - orgId: 1
    name: homeserver
    folder: Alerts
    interval: 1m
    rules:
      # NOTE: the "log-error-spike" rule was removed — its broad
      # (?i)(error|panic|fatal) regex across all containers matched benign log
      # lines and produced constant false-positive alerts. Container crash-loops
      # (below) remain the log-based health signal.
      - uid: container-crash-loop
        title: Container crash-looping
        condition: C
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: A container has restarted many times in the last 10 minutes
        noDataState: OK
        execErrState: OK
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              refId: A
              expr: 'increase(engine_daemon_container_actions_seconds_count{action="start"}[10m])'
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [3] }
