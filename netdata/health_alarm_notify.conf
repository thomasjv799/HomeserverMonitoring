#!/usr/bin/env bash
# Netdata alert notifications -> Telegram.
# alarm-notify.sh loads the stock config first, then this file (this file wins).
#
# IMPORTANT: the .env variables are TG_BOT_TOKEN / TG_CHAT_ID, NOT
# TELEGRAM_BOT_TOKEN / DEFAULT_RECIPIENT_TELEGRAM. The stock config assigns
# TELEGRAM_BOT_TOKEN="" (and DEFAULT_RECIPIENT_TELEGRAM="") as it loads, which
# would clobber an identically-named environment variable before we could read
# it. Using distinct names keeps the secrets intact.

# No mail server on this host — disable email to avoid failed sendmail attempts.
SEND_EMAIL="NO"

SEND_TELEGRAM="YES"
TELEGRAM_BOT_TOKEN="${TG_BOT_TOKEN}"
DEFAULT_RECIPIENT_TELEGRAM="${TG_CHAT_ID}"

# The stock config assigns each role_recipients_telegram[...] from
# DEFAULT_RECIPIENT_TELEGRAM while that value is still empty (stock loads before
# this file). So we must set the per-role recipients explicitly here, or alerts
# silently fall back to other methods. Point every alert role at our chat ID.
role_recipients_telegram[sysadmin]="${TG_CHAT_ID}"
role_recipients_telegram[domainadmin]="${TG_CHAT_ID}"
role_recipients_telegram[dba]="${TG_CHAT_ID}"
role_recipients_telegram[webmaster]="${TG_CHAT_ID}"
role_recipients_telegram[proxyadmin]="${TG_CHAT_ID}"
role_recipients_telegram[sitemgr]="${TG_CHAT_ID}"
